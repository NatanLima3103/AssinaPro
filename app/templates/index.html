{% extends "base.html" %}

{% block title %}Criar Assinatura | AssinaPro{% endblock %}

{% block content %}
<section class="card">
    <h1>Gerador de Assinaturas Profissionais</h1>
    <p class="subtitle">Preencha os dados abaixo para montar sua assinatura de e-mail.</p>

    <form action="#" method="post" class="signature-form">
        <div class="form-group">
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" required>
        </div>

        <div class="form-group">
            <label for="cargo">Cargo</label>
            <input type="text" id="cargo" name="cargo" required>
        </div>

        <div class="form-group">
            <label for="empresa">Empresa</label>
            <input type="text" id="empresa" name="empresa" required>
        </div>

        <div class="form-group">
            <label for="telefone">Telefone</label>
            <input type="text" id="telefone" name="telefone" required>
        </div>

        <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
            <label for="site">Site</label>
            <input type="url" id="site" name="site">
        </div>

        <div class="form-group">
            <label for="endereco">Endereço</label>
            <input type="text" id="endereco" name="endereco">
        </div>

        <div class="form-group">
            <label for="frase">Frase opcional</label>
            <textarea id="frase" name="frase" rows="3"></textarea>
        </div>

        <div class="form-group">
            <label for="modelo">Modelo da assinatura</label>
            <select id="modelo" name="modelo" required>
                <option value="">Selecione um modelo</option>
                <option value="moderno">Moderno</option>
                <option value="classico">Clássico</option>
            </select>
        </div>

        <button type="submit" class="btn-primary">Gerar assinatura</button>
    </form>
</section>
{% endblock %}
